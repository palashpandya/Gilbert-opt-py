[DEFAULT]
# Name of the input file that contains the reference density matrix
inputState = rho_in.mtx
#Name of the output file for the Closest separable state
outputState = rho_out2.mtx
# Where to print the decaying distance series for later analysis
outputStatistics = output_series2.csv
# Dimension list for subsystems
dimList = 2 2 2
# How many iterations/corrections to perform in the Gilbert's algorithm.
# The more the better approximation we get.
maxIterations = 50
# How many trials: Total number of randomly generated pure states in the algorithm.
# The algorithm keeps generating random pure product states until it finds one that improves the distance.
# Contributes to HALT condition: Stops the algorithm from completing maxIterations.
maxTrials = 10000000000
# If starting from an old CSS in 'outputState' set it to False.
startFromBeginning = True


